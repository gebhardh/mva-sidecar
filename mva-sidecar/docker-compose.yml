services:
  mva-sidecar:
    build: .
    container_name: mva-sidecar
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - ./config.yaml:/etc/mva-sidecar/config.yaml:ro
    environment:
      - TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
    depends_on:
      - victoriametrics
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    networks:
      - monitoring

networks:
  monitoring:

volumes:
  vm_data:
