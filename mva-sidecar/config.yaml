vm:
  read_url: http://victoriametrics:8428
  write_url: http://victoriametrics:8428/api/v1/write
  timeout_seconds: 30

detector_defaults:
  confidence: 0.9995
  use_robust: false
  support_fraction: 0.75
  variance_threshold: 1.0e-8
  training_window_minutes: 1440
  refit_interval_minutes: 120
  min_training_samples: 200

service:
  collection_interval_seconds: 180
  metrics_port: 9100
  log_level: INFO
  output_prefix: mva
  push_mode: push

tenants:
  - id: l5043022.bafw.irzi.de
    name: "l5043022.bafw.irzi.de"
    enabled: true
    labels:
      Funktion: ssloffloader
      Umgebung: IRZI
      criticality: high
    features:
      - name: netstat_tcp_syn_recv
        query: avg_over_time(netstat_tcp_syn_recv{instance=~"l5043022.*"}[3m])
      - name: netstat_tcp_closing
        query: avg_over_time(netstat_tcp_closing{instance=~"l5043022.*"}[3m])
      - name: netstat_tcp_established
        query: avg_over_time(netstat_tcp_established{instance=~"l5043022.*"}[3m])
